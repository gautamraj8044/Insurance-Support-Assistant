services:

  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: insurance_setup
    command: ["python", "setup.py"]
    env_file: .env
    environment:
      - DB_PATH=/app/data/insurance_support.db
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - app_data:/app/data
      - chroma_data:/app/chroma_db
      - app_logs:/app/logs
    profiles:
      - setup

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: insurance_app
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - DB_PATH=/app/data/insurance_support.db
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - app_data:/app/data
      - chroma_data:/app/chroma_db
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  app_data:
  chroma_data:
  app_logs:
